name: "02 - Snowflake DB & Ingestion Pipeline"

on:
  workflow_dispatch:
  push:
    paths:
      - 'snowflake/**'
      - 'scripts/**'
    branches:
      - main

jobs:
  run_snowflake_and_ingest:
    name: "Execute Snowflake Setup & Data Ingestion"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install requests azure-storage-blob snowflake-connector-python

      - name: Azure CLI Login & Fetch Storage Credentials
        uses: azure/login@v1
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: Retrieve Storage Account Name, Key & Generate SAS Token
        run: |
          # Query Azure for storage account name starting with 'azuredeblob' in resource group 'azure-de-pipeline-rg'
          SA_NAME=$(az storage account list --resource-group "azure-de-pipeline-rg" --query "[?starts_with(name, 'azuredeblob')].name | [0]" -o tsv)
          
          if [ -z "$SA_NAME" ]; then
            echo "Error: Storage account not found in Azure Resource Group 'azure-de-pipeline-rg'. Ensure Pipeline 1 was run first."
            exit 1
          fi

          # Get primary access key
          SA_KEY=$(az storage account keys list --account-name "$SA_NAME" --resource-group "azure-de-pipeline-rg" --query "[0].value" -o tsv)
          CONN_STR="DefaultEndpointsProtocol=https;AccountName=${SA_NAME};AccountKey=${SA_KEY};EndpointSuffix=core.windows.net"

          # Generate 7-day SAS Token for Snowflake External Stage
          EXPIRY=$(date -u -d "7 days" '+%Y-%m-%dT%H:%MZ')
          SAS_TOKEN=$(az storage container generate-sas \
            --account-name "$SA_NAME" \
            --account-key "$SA_KEY" \
            --name "raw-data" \
            --permissions acdlrw \
            --expiry "$EXPIRY" \
            -o tsv)

          echo "Found Storage Account: $SA_NAME"

          echo "AZURE_STORAGE_ACCOUNT=${SA_NAME}" >> $GITHUB_ENV
          echo "AZURE_STORAGE_KEY=${SA_KEY}" >> $GITHUB_ENV
          echo "AZURE_SAS_TOKEN=${SAS_TOKEN}" >> $GITHUB_ENV
          echo "AZURE_CONN_STR=${CONN_STR}" >> $GITHUB_ENV

      - name: Execute Snowflake DB Setup Scripts
        env:
          SNOWFLAKE_ACCOUNT: "TICRBPW-FO21753"
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          AZURE_STORAGE_ACCOUNT: ${{ env.AZURE_STORAGE_ACCOUNT }}
          AZURE_SAS_TOKEN: ${{ env.AZURE_SAS_TOKEN }}
        run: |
          python scripts/run_snowflake_setup.py

      - name: Execute Data Ingestion & Snowflake Load
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ env.AZURE_CONN_STR }}
          SNOWFLAKE_ACCOUNT: "TICRBPW-FO21753"
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python scripts/fetch_and_load.py
