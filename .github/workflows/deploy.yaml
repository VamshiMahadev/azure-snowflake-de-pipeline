name: "Azure & Snowflake IaC and Ingestion Pipeline"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy_and_ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install requests azure-storage-blob snowflake-connector-python

      - name: Terraform Init & Apply
        id: tf
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          SNOWFLAKE_ORGANIZATION_NAME: "TICRBPW"
          SNOWFLAKE_ACCOUNT_NAME: "FO21753"
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_ROLE: "ACCOUNTADMIN"
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="azure_subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="azure_client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var="azure_client_secret=${{ secrets.AZURE_CLIENT_SECRET }}" \
            -var="azure_tenant_id=${{ secrets.AZURE_TENANT_ID }}" \
            -var="snowflake_account=TICRBPW-FO21753" \
            -var="snowflake_user=${{ secrets.SNOWFLAKE_USER }}" \
            -var="snowflake_password=${{ secrets.SNOWFLAKE_PASSWORD }}"

      - name: Get Azure Storage Outputs
        id: azure_keys
        working-directory: ./terraform
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          SA_NAME=$(terraform output -raw storage_account_name)
          SA_KEY=$(terraform output -raw storage_account_key)
          CONN_STR="DefaultEndpointsProtocol=https;AccountName=${SA_NAME};AccountKey=${SA_KEY};EndpointSuffix=core.windows.net"
          
          echo "AZURE_STORAGE_ACCOUNT=${SA_NAME}" >> $GITHUB_ENV
          echo "AZURE_STORAGE_KEY=${SA_KEY}" >> $GITHUB_ENV
          echo "AZURE_CONN_STR=${CONN_STR}" >> $GITHUB_ENV

      - name: Execute Snowflake DB Setup Scripts
        env:
          SNOWFLAKE_ACCOUNT: "TICRBPW-FO21753"
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          AZURE_STORAGE_ACCOUNT: ${{ env.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_KEY: ${{ env.AZURE_STORAGE_KEY }}
        run: |
          python scripts/run_snowflake_setup.py

      - name: Execute Data Ingestion & Snowflake Load
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ env.AZURE_CONN_STR }}
          SNOWFLAKE_ACCOUNT: "TICRBPW-FO21753"
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
        run: |
          python scripts/fetch_and_load.py